<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Produksi — STP Lawang</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1116;
    --panel:#171c23;
    --panel-2:#1e252e;
    --line:#2a323d;
    --text:#e8ecf1;
    --muted:#8b95a3;
    --amber:#ffb020;
    --teal:#22d3b6;
    --red:#ff5c5c;
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:#000;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  /* trigger button (demo) */
  #openBtn{
    margin:24px;
    background:var(--amber);
    color:#171200;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    font-family:var(--font-display);
    font-weight:700;
    font-size:14px;
    letter-spacing:.02em;
    cursor:pointer;
  }
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.72);
    backdrop-filter:blur(3px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
    padding:16px;
  }
  .overlay.hidden{display:none;}
  .modal{
    width:100%;
    max-width:920px;
    max-height:92vh;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:14px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.6);
  }
  .modal-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 18px 10px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#12161c,#0e1116);
  }
  .modal-title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:15px;
    letter-spacing:.02em;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .modal-title .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--teal);
    box-shadow:0 0 8px var(--teal);
  }
  .closeBtn{
    width:30px;height:30px;
    border-radius:50%;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--muted);
    font-size:16px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .closeBtn:hover{color:var(--red);border-color:var(--red);}

  .tabs{
    display:flex;
    gap:6px;
    padding:12px 18px 0;
    border-bottom:1px solid var(--line);
    overflow-x:auto;
  }
  .tab{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:.06em;
    color:var(--muted);
    background:var(--panel);
    border:1px solid var(--line);
    border-bottom:none;
    padding:9px 14px;
    border-radius:8px 8px 0 0;
    cursor:pointer;
    white-space:nowrap;
  }
  .tab.active{
    color:var(--amber);
    background:var(--panel-2);
    border-color:var(--amber);
    box-shadow:0 -2px 0 var(--amber) inset;
  }

  .filters{
    display:flex;
    gap:8px;
    align-items:center;
    padding:12px 18px;
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
    font-size:12px;
  }
  .filters label{color:var(--muted);font-family:var(--font-mono);font-size:11px;}
  .filters input[type=date]{
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:6px;
    padding:6px 8px;
    font-family:var(--font-mono);
    font-size:12px;
  }
  .filters button{
    background:var(--teal);
    color:#032822;
    border:none;
    border-radius:6px;
    padding:7px 14px;
    font-family:var(--font-display);
    font-weight:700;
    font-size:12px;
    cursor:pointer;
  }
  .filters .hint{color:var(--muted);font-size:11px;margin-left:auto;}

  .body{
    flex:1;
    overflow-y:auto;
    padding:18px;
  }
  .state-msg{color:var(--muted);font-family:var(--font-mono);font-size:13px;padding:30px 4px;text-align:center;}
  .state-msg.error{color:var(--red);}

  /* summary cards */
  .cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
  .card{
    flex:1;min-width:150px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px;
  }
  .card .label{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;}
  .card .value{font-family:var(--font-mono);font-size:22px;font-weight:600;margin-top:4px;}
  .card.PENJERNIH .value{color:var(--teal);}
  .card.AVALAN .value{color:var(--amber);}
  .card.NONPENJERNIH .value{color:#7aa2ff;}

  /* radial gauge */
  .gauge-wrap{display:flex;align-items:center;gap:16px;}
  .gauge-num{font-family:var(--font-mono);font-size:13px;color:var(--muted);}
  .gauge-num b{display:block;font-size:26px;color:var(--text);font-weight:600;}

  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th{
    text-align:left;
    font-family:var(--font-mono);
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.05em;
    color:var(--muted);
    padding:8px 10px;
    border-bottom:1px solid var(--line);
    position:sticky;top:0;background:var(--bg);
  }
  td{
    padding:8px 10px;
    border-bottom:1px solid var(--line);
    font-family:var(--font-mono);
    color:var(--text);
  }
  tr:hover td{background:var(--panel);}
  .bar-cell{display:flex;align-items:center;gap:8px;min-width:140px;}
  .bar-track{flex:1;height:6px;background:var(--panel-2);border-radius:3px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:3px;}
  .section-title{
    font-family:var(--font-display);
    font-weight:600;
    font-size:13px;
    color:var(--text);
    margin:22px 0 10px;
    display:flex;align-items:center;gap:8px;
  }
  .section-title::before{content:"";width:3px;height:14px;background:var(--amber);border-radius:2px;}

  .keterangan{max-width:340px;white-space:pre-wrap;color:var(--muted);}
  .pill{
    display:inline-block;
    font-family:var(--font-mono);
    font-size:10.5px;
    padding:2px 7px;
    border-radius:10px;
    border:1px solid var(--line);
    color:var(--muted);
  }
</style>
</head>
<body>

<button id="openBtn">Buka Dashboard Produksi</button>

<div class="overlay hidden" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title"><span class="dot"></span> DASHBOARD PRODUKSI — STP LAWANG</div>
      <button class="closeBtn" id="closeBtn">✕</button>
    </div>

    <div class="tabs" id="tabs">
      <div class="tab active" data-sheet="GILING">GILING</div>
      <div class="tab" data-sheet="THERMO">THERMO</div>
      <div class="tab" data-sheet="EXTRUDER">EXTRUDER</div>
      <div class="tab" data-sheet="TEHNIK">TEHNIK</div>
    </div>

    <div class="filters">
      <label>DARI</label>
      <input type="date" id="startDate">
      <label>SAMPAI</label>
      <input type="date" id="endDate">
      <button id="applyBtn">TERAPKAN</button>
      <span class="hint" id="rangeHint"></span>
    </div>

    <div class="body" id="body">
      <div class="state-msg">Belum ada endpoint. Deploy Code.gs lalu isi ENDPOINT di script bawah file ini.</div>
    </div>
  </div>
</div>

<script>
/* =========================================================
   ISI DENGAN URL WEB APP APPS SCRIPT (yang diakhiri /exec)
   ========================================================= */
const ENDPOINT = "PASTE_URL_APPS_SCRIPT_DISINI";

const overlay = document.getElementById('overlay');
const bodyEl = document.getElementById('body');
const tabs = document.querySelectorAll('.tab');
const startDate = document.getElementById('startDate');
const endDate = document.getElementById('endDate');
const rangeHint = document.getElementById('rangeHint');

let currentSheet = 'GILING';

document.getElementById('openBtn').addEventListener('click', () => {
  overlay.classList.remove('hidden');
  setDefaultDates();
  load();
});
document.getElementById('closeBtn').addEventListener('click', () => overlay.classList.add('hidden'));
overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.classList.add('hidden'); });

tabs.forEach(t => t.addEventListener('click', () => {
  tabs.forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  currentSheet = t.dataset.sheet;
  load();
}));

document.getElementById('applyBtn').addEventListener('click', load);

function setDefaultDates(){
  if (startDate.value) return;
  const end = new Date();
  const start = new Date();
  start.setDate(end.getDate() - 6);
  endDate.value = end.toISOString().slice(0,10);
  startDate.value = start.toISOString().slice(0,10);
}

function fmtNum(n){
  return Number(n||0).toLocaleString('id-ID', {maximumFractionDigits: 1});
}
function fmtPct(n){
  return Number(n||0).toLocaleString('id-ID', {maximumFractionDigits: 1}) + '%';
}
function pctColor(p){
  if (p >= 45) return 'var(--teal)';
  if (p >= 35) return 'var(--amber)';
  return 'var(--red)';
}

function gaugeSVG(pct, size=90, color){
  const r = size/2 - 8;
  const c = 2*Math.PI*r;
  const clamped = Math.max(0, Math.min(100, pct));
  const offset = c - (clamped/100)*c;
  return `
  <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#242c36" stroke-width="8"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="8"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${offset}"
      transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="53%" text-anchor="middle" fill="${color}" font-family="IBM Plex Mono" font-size="16" font-weight="600">${clamped.toFixed(1)}%</text>
  </svg>`;
}

async function load(){
  if (!ENDPOINT || ENDPOINT.indexOf('PASTE_URL') !== -1){
    bodyEl.innerHTML = `<div class="state-msg error">Endpoint belum diisi. Buka file HTML ini, ganti ENDPOINT di bagian &lt;script&gt; dengan URL /exec dari Apps Script.</div>`;
    return;
  }
  bodyEl.innerHTML = `<div class="state-msg">Memuat data ${currentSheet}...</div>`;
  rangeHint.textContent = `${startDate.value} s/d ${endDate.value}`;

  const url = `${ENDPOINT}?sheet=${currentSheet}&start=${startDate.value}&end=${endDate.value}`;
  try{
    const res = await fetch(url);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Gagal ambil data');
    render(currentSheet, json.data);
  }catch(err){
    bodyEl.innerHTML = `<div class="state-msg error">Error: ${err.message}</div>`;
  }
}

function render(sheet, data){
  if (sheet === 'GILING') return renderGiling(data);
  if (sheet === 'THERMO') return renderThermo(data);
  if (sheet === 'EXTRUDER') return renderExtruder(data);
  if (sheet === 'TEHNIK') return renderTehnik(data);
}

/* ---------- GILING ---------- */
function renderGiling(data){
  const t = data.totals;
  let html = `
  <div class="cards">
    <div class="card PENJERNIH"><div class="label">Penjernih</div><div class="value">${fmtNum(t.PENJERNIH)}</div></div>
    <div class="card NONPENJERNIH"><div class="label">Non Penjernih</div><div class="value">${fmtNum(t['NON PENJERNIH'])}</div></div>
    <div class="card AVALAN"><div class="label">Avalan</div><div class="value">${fmtNum(t.AVALAN)}</div></div>
    <div class="card"><div class="label">Total Pemakaian</div><div class="value">${fmtNum(data.grandTotal)}</div></div>
  </div>
  <div class="section-title">Pemakaian Bahan per Hari (per Kategori)</div>
  <table><thead><tr>
    <th>Tanggal</th><th>Penjernih</th><th>Non Penjernih</th><th>Avalan</th><th>Total</th>
  </tr></thead><tbody>`;

  if (data.daily.length === 0) html += `<tr><td colspan="5" style="color:var(--muted)">Tidak ada data di rentang ini.</td></tr>`;

  data.daily.forEach(d => {
    const total = d.PENJERNIH + d['NON PENJERNIH'] + d.AVALAN;
    html += `<tr>
      <td>${d.tanggal}</td>
      <td style="color:var(--teal)">${fmtNum(d.PENJERNIH)}</td>
      <td style="color:#7aa2ff">${fmtNum(d['NON PENJERNIH'])}</td>
      <td style="color:var(--amber)">${fmtNum(d.AVALAN)}</td>
      <td>${fmtNum(total)}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  bodyEl.innerHTML = html;
}

/* ---------- THERMO ---------- */
function renderThermo(data){
  let html = `
  <div class="cards">
    <div class="card"><div class="label">Total Keluar</div><div class="value">${fmtNum(data.totalKeluar)}</div></div>
    <div class="card"><div class="label">Total Tonase</div><div class="value">${fmtNum(data.totalTonase)}</div></div>
    <div class="card"><div class="label">% Tonase / Keluar (keseluruhan)</div><div class="value" style="color:${pctColor(data.overallPercentage)}">${fmtPct(data.overallPercentage)}</div></div>
  </div>
  <div class="section-title">Persentase Tonase terhadap Keluar per Mesin</div>
  <table><thead><tr>
    <th>Mesin</th><th>Keluar</th><th>Tonase</th><th>Persentase</th>
  </tr></thead><tbody>`;

  if (data.machines.length === 0) html += `<tr><td colspan="4" style="color:var(--muted)">Tidak ada data di rentang ini.</td></tr>`;

  data.machines.forEach(m => {
    const color = pctColor(m.percentage);
    html += `<tr>
      <td><span class="pill">${m.mesin}</span></td>
      <td>${fmtNum(m.keluar)}</td>
      <td>${fmtNum(m.tonase)}</td>
      <td>
        <div class="bar-cell">
          <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,m.percentage)}%;background:${color}"></div></div>
          <span style="color:${color};min-width:48px">${fmtPct(m.percentage)}</span>
        </div>
      </td>
    </tr>`;
  });
  html += `</tbody></table>`;
  bodyEl.innerHTML = html;
}

/* ---------- EXTRUDER ---------- */
function renderExtruder(data){
  const color = pctColor(data.percentage);
  let html = `
  <div class="cards" style="align-items:center;">
    <div class="card" style="flex:0 0 auto;display:flex;align-items:center;gap:14px;">
      ${gaugeSVG(data.percentage, 96, color)}
      <div>
        <div class="label">Efisiensi Hasil</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:4px">Hasil ÷ (Pemakaian Bahan + WIP×60%)</div>
      </div>
    </div>
    <div class="card"><div class="label">Total Hasil</div><div class="value">${fmtNum(data.totalHasil)}</div></div>
    <div class="card"><div class="label">Pemakaian Bahan (Giling)</div><div class="value">${fmtNum(data.totalPemakaianBahan)}</div></div>
    <div class="card"><div class="label">WIP × 60%</div><div class="value">${fmtNum(data.wipContribution)}</div></div>
  </div>
  <div class="section-title">Hasil Extruder per Hari</div>
  <table><thead><tr><th>Tanggal</th><th>Hasil</th></tr></thead><tbody>`;

  if (data.daily.length === 0) html += `<tr><td colspan="2" style="color:var(--muted)">Tidak ada data di rentang ini.</td></tr>`;
  data.daily.forEach(d => {
    html += `<tr><td>${d.tanggal}</td><td>${fmtNum(d.hasil)}</td></tr>`;
  });
  html += `</tbody></table>`;
  bodyEl.innerHTML = html;
}

/* ---------- TEHNIK ---------- */
function renderTehnik(data){
  let html = `
  <div class="section-title">Log Downtime</div>
  <table><thead><tr>
    <th>Tanggal</th><th>Shift</th><th>Divisi</th><th>Durasi</th><th>Keterangan</th><th>Nama</th>
  </tr></thead><tbody>`;

  if (data.logs.length === 0) html += `<tr><td colspan="6" style="color:var(--muted)">Tidak ada data di rentang ini.</td></tr>`;
  data.logs.forEach(l => {
    html += `<tr>
      <td>${l.tanggal}</td>
      <td>${l.shift}</td>
      <td><span class="pill">${l.divisi}</span></td>
      <td style="color:var(--amber)">${l.downtime}</td>
      <td class="keterangan">${l.keterangan}</td>
      <td style="color:var(--muted)">${l.nama}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  bodyEl.innerHTML = html;
}
</script>
</body>
</html>
